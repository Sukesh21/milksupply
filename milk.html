<!DOCTYPE html>
<html>

<head>

<title>Milk Connect</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}


body{

min-height:100vh;

background:
linear-gradient(135deg,#001f3f,#0074D9,#85144b);

color:white;

padding:30px;

}



.container{

max-width:1100px;
margin:auto;

}



.logo{

text-align:center;

font-size:55px;

color:#ffe600;

animation:glow 2s infinite alternate;

}



@keyframes glow{

from{
text-shadow:0 0 10px gold;
}

to{
text-shadow:0 0 40px white;
}

}




.card{


margin-top:25px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(20px);

padding:30px;

border-radius:30px;

box-shadow:0 0 40px #0005;

}





input,select{


width:100%;

padding:15px;

margin:12px 0;

border:none;

border-radius:20px;

font-size:16px;

outline:none;

}





input:focus,select:focus{

box-shadow:
0 0 20px #00ffff;

transform:scale(1.02);

}







/* PHONE DESIGN */


.phone-box{


display:flex;

align-items:center;

background:white;

border-radius:25px;

padding:5px;

margin:12px 0;


}



.phone-box span{


background:#0074D9;

padding:14px;

border-radius:20px;

font-size:20px;

}




.phone-box select{


width:90px;

margin:0;

background:#eaf8ff;

}



.phone-box input{


margin:0;

color:#333;

}





button{


width:100%;

padding:16px;

border:none;

border-radius:30px;

background:#ffe600;

font-size:20px;

font-weight:bold;

cursor:pointer;

}



button:hover{

transform:scale(1.05);

}





.menu{

display:flex;

gap:20px;

margin-top:20px;

}



.menu button{

background:#00ff99;

}







.users{


display:grid;

grid-template-columns:
repeat(auto-fit,minmax(270px,1fr));

gap:25px;

margin-top:30px;


}




.user{


background:white;

color:#222;

padding:25px;

border-radius:30px;

animation:show .7s;

box-shadow:0 20px 40px #0005;

transition:.4s;


}



.user:hover{

transform:translateY(-15px);

}




@keyframes show{

from{

opacity:0;
transform:scale(.7);

}

to{

opacity:1;
transform:scale(1);

}

}




.profile{

text-align:center;

}



.profile img{


width:110px;

height:110px;

border-radius:50%;

object-fit:cover;

border:5px solid #00c6ff;

}





.profile h2{

color:#0074D9;

margin:10px;

}



.badge{


display:inline-block;

padding:8px 20px;

border-radius:20px;

background:#00cc66;

color:white;

}



.buy{

background:#ff851b;

}



.details{


margin-top:15px;

background:#eefaff;

padding:15px;

border-radius:20px;

}



.phone-card{


margin-top:15px;

background:#0074D9;

color:white;

padding:15px;

border-radius:20px;

font-size:18px;

text-align:center;

}





.quantity{


margin-top:15px;

background:#ffe600;

padding:15px;

border-radius:20px;

text-align:center;

font-weight:bold;

}





</style>

</head>



<body>



<div class="container">


<h1 class="logo">

🥛 MILK CONNECT 🐄

</h1>





<div class="card">


<h2>
Create Milk Profile
</h2>




<input 
type="file"
id="photo"
accept="image/*">



<input 
id="name"
placeholder="👤 Full Name">





<div class="phone-box">


<span>📞</span>


<select id="code">

<option>
+91
</option>

<option>
+1
</option>

<option>
+44
</option>

<option>
+971
</option>

</select>



<input 
id="phone"
placeholder="Mobile Number"
maxlength="10">


</div>





<select id="type">


<option value="supplier">

Supplier

</option>


<option value="buyer">

Buyer

</option>


</select>




<input
id="quantity"
placeholder="🥛 Milk Quantity (Litres)">






<button onclick="saveUser()">

💾 Save Details

</button>



</div>








<div class="card">


<div class="menu">


<button onclick="showBuyers()">

BUY

</button>


<button onclick="showSellers()">

SELL

</button>



</div>


</div>





<div id="users" class="users"></div>



</div>









<script>



let users=[];





function saveUser(){


let number =
document.getElementById("phone").value;



if(number.length!=10 || isNaN(number)){


alert("Enter valid 10 digit phone number");

return;

}




let file =
document.getElementById("photo")
.files[0];



let reader =
new FileReader();




reader.onload=function(){



let user={


photo:reader.result,

name:
name.value,


phone:
code.value+" "+number,


type:
type.value,


quantity:
quantity.value


};




users.push(user);



display(users);



}




if(file)

reader.readAsDataURL(file);



}








function display(list){


let html="";



list.forEach(u=>{


html+=`



<div class="user">



<div class="profile">


<img src="${u.photo}">


<h2>
${u.name}
</h2>



<span class="badge 
${u.type=="buyer"?'buy':''}">

${u.type}

</span>



</div>





<div class="phone-card">

📞 ${u.phone}

</div>





<div class="details">


Type :
<b>${u.type}</b>


</div>




<div class="quantity">

🥛 ${u.quantity} Litres

</div>



</div>


`;



});




document.getElementById("users")
.innerHTML=html;


}





function showBuyers(){


display(
users.filter(
x=>x.type=="supplier"
)
);


}





function showSellers(){


display(
users.filter(
x=>x.type=="buyer"
)
);



}




</script>



</body>

</html>
